services:
  postgres:
    image: postgres:16-alpine
    container_name: securex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: securex
    ports:
      - "5432:5432"
    volumes:
      - securex_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  securex_postgres_data:
